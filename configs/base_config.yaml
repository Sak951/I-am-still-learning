# configs/gpu_8gb_config.yaml
vocab_size: 32000
block_size: 256
n_embd: 384
n_head: 6
n_layer: 6
dropout: 0.1
bias: true
learning_rate: 0.0003
weight_decay: 0.01
betas: [0.9, 0.95]
grad_clip: 1.0
warmup_steps: 100
gradient_accumulation_steps: 4
batch_size: 8
epochs: 10
save_every: 1
eval_every: 100
output_dir: "checkpoints"
data_dir: "data/processed"
device: "cuda"